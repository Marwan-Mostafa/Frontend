<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link rel="stylesheet" href="tailwind.css">
        <title>Website | Practice</title>
    </head>
    <body class="flex flex-col items-center justify-center h-screen bg-gray-900 text-white">
        <h1 class="text-4xl font-semibold mb-6">Counter App</h1>
        <div id="counter" class="text-6xl mb-8">0</div>
        <div class="space-x-4">
            <button id="decrease" class="bg-red-600 px-4 py-2 text-white rounded-full hover:bg-red-500 transition">Decrease</button>
            <button id="reset" class="bg-gray-600 px-4 py-2 text-white rounded-full hover:bg-gray-500 transition">Reset</button>
            <button id="increase" class="bg-green-600 px-4 py-2 text-white rounded-full hover:bg-green-500 transition">Increase</button>
        </div>
        <script src="script.js"></script>
    </body>
</html>
